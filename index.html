<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 自動翻譯英文單字卡</title>
    <style>
        :root { --primary-color: #4f46e5; --success-color: #10b981; --danger-color: #ef4444; --card-bg: #ffffff; --text-main: #1e293b; }
        body { font-family: system-ui, sans-serif; background-color: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; }
        h2 { text-align: center; color: #0f172a; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 25px; background: white; padding: 12px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .controls input { flex: 1; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-add { background-color: #4f46e5; color: white; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .card-container { perspective: 1000px; }
        .word-card { width: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; min-height: 130px; }
        .card-container.flipped .word-card { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 14px; padding: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); background: white; box-sizing: border-box; border-left: 5px solid; }
        .card-front { border-left-color: #4f46e5; }
        .card-back { border-left-color: #10b981; transform: rotateY(180deg); }
        textarea { width: 100%; border: none; resize: none; outline: none; background: transparent; font-size: 1.1rem; height: 60px; }
        .card-actions { display: flex; gap: 6px; margin-top: 10px; }
        .btn-card { flex: 1; padding: 6px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-flip { background: #f1f5f9; }
        .btn-delete { background: #fef2f2; color: #ef4444; }
    </style>
</head>
<body>
<div class="container">
    <h2>🗂️ Smart English Flashcards</h2>
    <div class="controls">
        <input type="text" id="engInput" placeholder="Enter English..." onkeypress="if(event.key==='Enter') addCardFromUI()">
        <button class="btn btn-add" id="addBtn" onclick="addCardFromUI()">➕ Add</button>
    </div>
    <div id="cardGrid" class="card-grid"></div>
</div>
<script>
    window.onload = loadCards;
    async function addCardFromUI() {
        const input = document.getElementById('engInput'), btn = document.getElementById('addBtn');
        const engText = input.value.trim();
        if (!engText) return;
        btn.disabled = true; btn.textContent = '⚡...';
        let chText = '翻譯失敗';
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(engText)}&langpair=en|zh-TW`);
            const data = await res.json();
            if (data?.responseData) chText = data.responseData.translatedText;
        } catch (e) { console.error(e); }
        createCardDOM(engText, chText);
        input.value = ''; btn.disabled = false; btn.textContent = '➕ Add'; saveCards();
    }
    function createCardDOM(eng, ch) {
        const div = document.createElement('div');
        div.className = 'card-container';
        div.innerHTML = `<div class="word-card"><div class="card-front"><textarea class="eng-text">${eng}</textarea><div class="card-actions"><button class="btn-card btn-flip" onclick="this.closest('.card-container').classList.toggle('flipped')">🔄</button><button class="btn-card btn-delete" onclick="this.closest('.card-container').remove(); saveCards()">🗑️</button></div></div><div class="card-back"><textarea class="ch-text">${ch}</textarea><div class="card-actions"><button class="btn-card btn-flip" onclick="this.closest('.card-container').classList.toggle('flipped')">🔄</button></div></div></div>`;
        document.getElementById('cardGrid').prepend(div);
    }
    function saveCards() {
        const cards = Array.from(document.querySelectorAll('.card-container')).map(c => ({
            english: c.querySelector('.eng-text').value,
            chinese: c.querySelector('.ch-text').value
        }));
        localStorage.setItem('cards', JSON.stringify(cards));
    }
    function loadCards() {
        const data = JSON.parse(localStorage.getItem('cards') || '[]');
        data.forEach(c => createCardDOM(c.english, c.chinese));
    }
</script>
</body>
</html>
